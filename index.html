<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RotaLeitura</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#031D44">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RotaLeitura">

<link rel="icon" type="image/png" sizes="192x192" href="launchericon-192x192.png">
<link rel="apple-touch-icon" href="launchericon-192x192.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#EEF2F6;
  color:#031D44;
}

.topo{
  background:#031D44;
  color:white;
  padding:26px 20px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.logo{
  font-size:30px;
  font-weight:700;
}

.sub{
  margin-top:6px;
  font-size:14px;
  color:#D7E3F4;
}

.container{
  padding:16px;
}

.card{
  background:white;
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  border:1px solid #E2E8F0;
}

input,
select{
  width:100%;
  padding:15px 16px;
  margin-bottom:14px;
  border:1px solid #DCE3EA;
  border-radius:16px;
  font-size:15px;
  background:white;
  outline:none;
  transition:.2s;
}

input:focus,
select:focus{
  border-color:#1976D2;
  box-shadow:0 0 0 4px rgba(25,118,210,.12);
}

.botao{
  display:block;
  background:#1976D2;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:15px;
  border-radius:16px;
  margin-top:12px;
  font-weight:600;
  border:none;
  width:100%;
  cursor:pointer;
}

.logout{
  background:#C62828;
}

.abas{
  display:flex;
  background:white;
  padding:8px;
  gap:8px;
}

.aba{
  flex:1;
  border:none;
  padding:14px;
  border-radius:14px;
  font-weight:600;
  background:#E9EEF5;
}

.ativa{
  background:#1976D2;
  color:white;
}

.oculto{
  display:none;
}

#map{
  width:100%;
  height:75vh;
  border-radius:22px;
  margin-top:14px;
}

.loadingTela{
  position:fixed;
  inset:0;
  background:#031D44;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999999;
  color:white;
}

.loader{
  width:55px;
  height:55px;
  border:5px solid rgba(255,255,255,.2);
  border-top:5px solid white;
  border-radius:50%;
  animation:girar 1s linear infinite;
}

@keyframes girar{
  to{
    transform:rotate(360deg);
  }
}

.loadingTexto{
  margin-top:20px;
}

.infoTitulo{
  font-size:13px;
  color:#64748B;
  margin-bottom:4px;
  font-weight:600;
}

.infoValor{
  font-size:15px;
  font-weight:600;
  margin-bottom:14px;
}

.statusOffline{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:#031D44;
  color:white;
  padding:14px;
  border-radius:16px;
  text-align:center;
  z-index:99999;
}

</style>

</head>
<body>

<div id="loadingTela" class="loadingTela oculto">
<div class="loader"></div>
<div class="loadingTexto">Carregando...</div>
</div>

<div id="offlineAviso" class="statusOffline oculto">
📡 Modo Offline Ativo
</div>

<div id="loginTela">

<div class="topo">
<div class="logo">RotaLeitura</div>
<div class="sub">Inteligência em campo</div>
</div>

<div class="container">
<div class="card">

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button class="botao" onclick="fazerLogin()">
ENTRAR
</button>

</div>
</div>

</div>

<div id="appTela" class="oculto">

<div class="topo">
<div class="logo">RotaLeitura</div>
<div class="sub">Inteligência em campo</div>
</div>

<div class="abas">

<button class="aba ativa" id="btnBusca" onclick="abrirAba('busca')">
BUSCA
</button>

<button class="aba" id="btnMapa" onclick="abrirAba('mapa')">
MAPA
</button>

</div>

<div id="abaBusca" class="container">

<select id="area"></select>

<input list="listaMRUs" id="mru" placeholder="Digite ou selecione a MRU">
<datalist id="listaMRUs"></datalist>

<input type="text" id="busca" placeholder="Buscar instalação, medidor ou cliente">

<div id="resultados"></div>

</div>

<div id="abaMapa" class="container oculto">

<select id="areaMapa"></select>

<input list="listaMRUsMapa" id="mruMapa" placeholder="Digite ou selecione a MRU">
<datalist id="listaMRUsMapa"></datalist>

<button class="botao" onclick="carregarMapa()">
EXIBIR MAPA
</button>

<div id="map"></div>

</div>

<div class="container">
<button class="botao logout" onclick="logout()">
SAIR
</button>
</div>

</div>

<script type="module">

import { initializeApp }
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

import {
getFirestore,
doc,
getDoc
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_STORAGE_BUCKET",
messagingSenderId: "SEU_MSG_ID",
appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let permissoes = [];
let bancoBusca = [];
let bancoMapa = [];
let indexes = {};
let map = null;

const AREAS = {
"171":"ITABUNA",
"172":"IBICARAI",
"173":"ILHÉUS",
"174":"COARACI",
"175":"CANAVIEIRAS",
"176":"CAMACAN"
};

window.fazerLogin = async function(){

try{

mostrarLoading('Entrando...');

await signInWithEmailAndPassword(
  auth,
  document.getElementById('email').value,
  document.getElementById('senha').value
);

}catch(e){

alert('Login inválido');
console.error(e);

}finally{

ocultarLoading();

}

}

window.logout = async function(){
await signOut(auth);
}

onAuthStateChanged(auth, async user => {

if(!user){

loginTela.classList.remove('oculto');
appTela.classList.add('oculto');

return;

}

try{

mostrarLoading('Carregando usuário...');

let snap = await getDoc(
  doc(db,'usuarios',user.email)
);

if(!snap.exists()){
alert('Sem permissão');
logout();
return;
}

let dados = snap.data();

if(!dados.ativo){
alert('Usuário desativado');
logout();
return;
}

permissoes = dados.areas || [];

loginTela.classList.add('oculto');
appTela.classList.remove('oculto');

await carregarSistema();

}catch(e){
console.error(e);
alert('Erro ao carregar usuário');

}finally{

ocultarLoading();

}

});

async function carregarSistema(){

try{

let response = await fetch('./indexes.json');

if(!response.ok){
throw new Error('Erro ao carregar indexes');
}

indexes = await response.json();

popularAreas();

}catch(e){

console.error(e);
alert('Erro ao carregar sistema');

}

}

function popularAreas(){

let html = '<option value="">Selecionar Área</option>';

permissoes.forEach(areaCodigo => {
html += `<option value="${areaCodigo}">${areaCodigo} - ${AREAS[areaCodigo] || areaCodigo}</option>`;
});

area.innerHTML = html;
areaMapa.innerHTML = html;

if(permissoes.length === 1){

area.value = permissoes[0];
areaMapa.value = permissoes[0];

area.style.display='none';
areaMapa.style.display='none';

carregarArea();
carregarAreaMapa();

}

}

window.abrirAba = function(tipo){

abaBusca.classList.add('oculto');
abaMapa.classList.add('oculto');

btnBusca.classList.remove('ativa');
btnMapa.classList.remove('ativa');

if(tipo === 'busca'){

abaBusca.classList.remove('oculto');
btnBusca.classList.add('ativa');

}else{

abaMapa.classList.remove('oculto');
btnMapa.classList.add('ativa');

setTimeout(()=>{
if(map){
map.invalidateSize();
}
},300);

}

}

function normalizar(texto){

return String(texto || '')
.toLowerCase()
.normalize('NFD')
.replace(/[\u0300-\u036f]/g,'')
.replace(/rua/g,'')
.replace(/avenida/g,'')
.replace(/travessa/g,'')
.replace(/av/g,'')
.replace(/\s+/g,'')
.trim();

}

area.addEventListener('change', carregarArea);

async function carregarArea(){

mostrarLoading('Carregando instalações...');

try{

bancoBusca = [];

let arquivos = indexes[area.value] || [];

for(let arquivo of arquivos){

let response = await fetch('./'+arquivo);

if(!response.ok){
throw new Error('Erro ao carregar '+arquivo);
}

let parte = await response.json();

bancoBusca = bancoBusca.concat(parte);

}

let mrus = [...new Set(bancoBusca.map(i=>i[0]))];
mrus.sort();

listaMRUs.innerHTML='';

mrus.forEach(mruItem=>{
listaMRUs.innerHTML += `<option value="${mruItem}">`;
});

}catch(e){

console.error(e);
alert('Erro ao carregar área');

}finally{

ocultarLoading();

}

}

mru.addEventListener('input', pesquisar);
busca.addEventListener('input', pesquisar);

function pesquisar(){

let filtroMRU = normalizar(mru.value);
let filtroTexto = normalizar(busca.value);

let listaResultados = bancoBusca.filter(item=>{

let okMRU = !filtroMRU || normalizar(item[0]).includes(filtroMRU);

let texto = normalizar(
item[1]+' '+
item[2]+' '+
item[3]+' '+
item[4]+' '+
item[5]+' '+
item[6]+' '+
item[7]
);

let okTexto = !filtroTexto || texto.includes(filtroTexto);

return okMRU && okTexto;

}).slice(0,100);

let html = `
<div class="card">
<b>${listaResultados.length}</b> resultado(s)
</div>
`;

if(listaResultados.length === 0){
html += `<div class="card">Nenhum resultado encontrado.</div>`;
}

listaResultados.forEach(item=>{

html += `
<div class="card">

<div class="infoTitulo">⚡ Instalação</div>
<div class="infoValor">${item[1]}</div>

<div class="infoTitulo">🔢 Medidor</div>
<div class="infoValor">${item[2]}</div>

<div class="infoTitulo">📍 Endereço</div>
<div class="infoValor">${item[3]}, ${item[4]}</div>

<div class="infoTitulo">🗺 Bairro</div>
<div class="infoValor">${item[5]}</div>

<div class="infoTitulo">🏙 Cidade</div>
<div class="infoValor">${item[6]}</div>

<div class="infoTitulo">👤 Cliente</div>
<div class="infoValor">${item[7]}</div>

<a class="botao" href="${item[10]}" target="_blank">
🗺 Navegar
</a>

</div>
`;

});

document.getElementById('resultados').innerHTML = html;

}

areaMapa.addEventListener('change', carregarAreaMapa);

async function carregarAreaMapa(){

mostrarLoading('Carregando mapa...');

try{

bancoMapa=[];

let arquivos = indexes[areaMapa.value] || [];

for(let arquivo of arquivos){

let response = await fetch('./'+arquivo);

if(!response.ok){
throw new Error('Erro ao carregar '+arquivo);
}

let parte = await response.json();

bancoMapa = bancoMapa.concat(parte);

}

let mrus = [...new Set(bancoMapa.map(i=>i[0]))];
mrus.sort();

listaMRUsMapa.innerHTML='';

mrus.forEach(mruItem=>{
listaMRUsMapa.innerHTML += `<option value="${mruItem}">`;
});

}catch(e){

console.error(e);
alert('Erro ao carregar mapa');

}finally{

ocultarLoading();

}

}

window.carregarMapa = function(){

let dados = bancoMapa.filter(i=>i[0] == mruMapa.value);

if(dados.length===0){
alert('Nenhuma instalação encontrada');
return;
}

let primeiro = dados.find(i=>i[8] !== 'nan' && i[9] !== 'nan');

if(!primeiro){
alert('Sem coordenadas válidas');
return;
}

if(map){
map.remove();
}

map = L.map('map').setView([
parseFloat(primeiro[8]),
parseFloat(primeiro[9])
],15);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
).addTo(map);


dados.forEach(item=>{

if(item[8]=='nan' || item[9]=='nan') return;

let marker = L.marker([
parseFloat(item[8]),
parseFloat(item[9])
]).addTo(map);

marker.bindPopup(`
<b>⚡ Instalação:</b><br>
${item[1]}
<br><br>
<b>👤 Cliente:</b><br>
${item[7]}
<br><br>
<b>📍 Rua:</b><br>
${item[3]}, ${item[4]}
<br><br>
<a href="${item[10]}" target="_blank">
🗺 Navegar
</a>
`);

});

}

function mostrarLoading(texto='Carregando...'){
loadingTela.classList.remove('oculto');
document.querySelector('.loadingTexto').innerText = texto;
}

function ocultarLoading(){
loadingTela.classList.add('oculto');
}

function atualizarInternet(){

if(navigator.onLine){
offlineAviso.classList.add('oculto');
}else{
offlineAviso.classList.remove('oculto');
}

}

window.addEventListener('online', atualizarInternet);
window.addEventListener('offline', atualizarInternet);

atualizarInternet();

if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('./sw.js?v=15000');
});
}

</script>

</body>
</html>
```
