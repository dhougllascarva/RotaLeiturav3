<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>RotaLeitura</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#031D44">

<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent"
>

<meta
name="apple-mobile-web-app-title"
content="RotaLeitura"
>

<link
rel="apple-touch-icon"
href="launchericon-192x192.png"
>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#EEF2F6;
  color:#031D44;
}

.topo{
  background:#031D44;
  color:white;
  padding:26px 20px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.logo{
  font-size:30px;
  font-weight:700;
  letter-spacing:.5px;
}

.sub{
  margin-top:6px;
  font-size:14px;
  opacity:.85;
  color:#D7E3F4;
}

.container{
  padding:16px;
}

.card{
  background:white;
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  border:1px solid #E2E8F0;
}

input,
select{
  width:100%;
  padding:15px 16px;
  margin-bottom:14px;
  border:1px solid #DCE3EA;
  border-radius:16px;
  font-size:15px;
  background:white;
  outline:none;
  transition:.2s;
  color:#031D44;
}

input:focus,
select:focus{
  border-color:#1976D2;
  box-shadow:0 0 0 4px rgba(25,118,210,.12);
}

.botao{
  display:block;
  background:#1976D2;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:15px;
  border-radius:16px;
  margin-top:12px;
  font-weight:600;
  border:none;
  width:100%;
  font-size:15px;
  transition:.2s;
  cursor:pointer;
}

.botao:active{
  transform:scale(.98);
}

.logout{
  background:#C62828;
}

.abas{
  display:flex;
  background:white;
  padding:8px;
  gap:8px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.aba{
  flex:1;
  border:none;
  padding:14px;
  font-size:15px;
  font-weight:600;
  border-radius:14px;
  background:#E9EEF5;
  color:#031D44;
  transition:.2s;
}

.ativa{
  background:#1976D2;
  color:white;
}

#map{
  width:100%;
  height:75vh;
  border-radius:22px;
  margin-top:14px;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.oculto{
  display:none;
}

</style>

</head>

<body>

<div id="loginTela">

<div class="topo">

<div class="logo">
RotaLeitura
</div>

<div class="sub">
Inteligência em campo
</div>

</div>

<div class="container">

<div class="card">

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="password"
id="senha"
placeholder="Senha"
>

<button
class="botao"
onclick="fazerLogin()"
>

ENTRAR

</button>

</div>

</div>

</div>

<div
id="appTela"
class="oculto"
>

<div class="topo">

<div class="logo">
RotaLeitura
</div>

<div class="sub">
Inteligência em campo
</div>

</div>

<div class="abas">

<button
class="aba ativa"
id="btnBusca"
onclick="abrirAba('busca')"
>
BUSCA
</button>

<button
class="aba"
id="btnMapa"
onclick="abrirAba('mapa')"
>
MAPA
</button>

</div>

<div
id="abaBusca"
class="container"
>

<select id="area"></select>

<input
list="listaMRUs"
id="mru"
placeholder="Digite ou selecione a MRU"
>

<datalist id="listaMRUs"></datalist>

<input
type="text"
id="busca"
placeholder="Buscar instalação, medidor ou cliente"
>

<div id="resultados"></div>

</div>

<div
id="abaMapa"
class="container oculto"
>

<select id="areaMapa"></select>

<input
list="listaMRUsMapa"
id="mruMapa"
placeholder="Digite ou selecione a MRU"
>

<datalist id="listaMRUsMapa"></datalist>

<button
class="botao"
onclick="carregarMapa()"
>

EXIBIR MAPA

</button>

<div id="map"></div>

</div>

<div class="container">

<button
class="botao logout"
onclick="logout()"
>

SAIR

</button>

</div>

</div>

<script type="module">

import { initializeApp }

from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {

  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut

}

from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

import {

  getFirestore,
  doc,
  getDoc

}

from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {

  apiKey: "AIzaSyAVmx3h0aMvivJ3jAVSkyndK8buCnrRbEA",

  authDomain: "rotaleitura.firebaseapp.com",

  projectId: "rotaleitura",

  storageBucket: "rotaleitura.firebasestorage.app",

  messagingSenderId: "1084691059100",

  appId: "1:1084691059100:web:2ce8c10354da0cc191f859"

};

const app =
  initializeApp(firebaseConfig);

const auth =
  getAuth(app);

const db =
  getFirestore(app);

window.fazerLogin =
async function(){

  let email =
    document.getElementById('email').value;

  let senha =
    document.getElementById('senha').value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      senha
    );

  }catch(e){

    alert('Login inválido');

  }

}

window.logout =
async function(){

  await signOut(auth);

}

let permissoes = [];

let banco = [];
let indexes = {};
let map = null;

const AREAS = {
  "171":"ITABUNA",
  "172":"IBICARAI",
  "173":"ILHÉUS",
  "174":"COARACI",
  "175":"CANAVIEIRAS",
  "176":"CAMACAN"
};

onAuthStateChanged(auth,
async user => {

  if(!user){

    document
      .getElementById('loginTela')
      .classList.remove('oculto');

    document
      .getElementById('appTela')
      .classList.add('oculto');

    return;

  }

  let ref =
    doc(db,'usuarios',user.email);

  let snap =
    await getDoc(ref);

  if(!snap.exists()){

    alert('Sem permissão');

    logout();

    return;

  }

  let dados =
    snap.data();

  if(!dados.ativo){

    alert('Usuário desativado');

    logout();

    return;

  }

  permissoes =
    dados.areas;

  document
    .getElementById('loginTela')
    .classList.add('oculto');

  document
    .getElementById('appTela')
    .classList.remove('oculto');

  carregarSistema();

});

if ('serviceWorker' in navigator) {

  window.addEventListener('load', () => {

    navigator.serviceWorker
      .register('/RotaLeitura/sw.js?v=13001');

  });

}

</script>

</body>
</html>
