<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RotaLeitura</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#031D44">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RotaLeitura">

<link rel="icon" type="image/png" sizes="192x192" href="launchericon-192x192.png">
<link rel="apple-touch-icon" href="launchericon-192x192.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#EEF2F6;
  color:#031D44;
}

.topo{
  background:#031D44;
  color:white;
  padding:26px 20px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  font-size:30px;
  font-weight:700;
  letter-spacing:.5px;
}

.sub{
  margin-top:6px;
  font-size:14px;
  color:#D7E3F4;
}

.container{
  padding:16px;
}

.card{
  background:white;
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  border:1px solid #E2E8F0;
}

input,
select{
  width:100%;
  padding:15px 16px;
  margin-bottom:14px;
  border:1px solid #DCE3EA;
  border-radius:16px;
  font-size:15px;
  background:white;
  outline:none;
  transition:.2s;
  color:#031D44;
}

input:focus,
select:focus{
  border-color:#1976D2;
  box-shadow:0 0 0 4px rgba(25,118,210,.12);
}

.botao{
  display:block;
  background:#1976D2;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:15px;
  border-radius:16px;
  margin-top:12px;
  font-weight:600;
  border:none;
  width:100%;
  cursor:pointer;
  transition:.2s;
}

.botao:active{
  transform:scale(.98);
}

.logout{
  background:#C62828;
}

.abas{
  display:flex;
  background:white;
  padding:8px;
  gap:8px;
  position:sticky;
  top:94px;
  z-index:998;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.aba{
  flex:1;
  border:none;
  padding:14px;
  border-radius:14px;
  font-weight:600;
  background:#E9EEF5;
  color:#031D44;
  cursor:pointer;
}

.ativa{
  background:#1976D2;
  color:white;
}

.oculto{
  display:none !important;
}

#map{
  width:100%;
  height:75vh;
  border-radius:22px;
  margin-top:14px;
  overflow:hidden;
}

.loadingTela{
  position:fixed;
  inset:0;
  background:#031D44;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999999;
  color:white;
}

.loader{
  width:55px;
  height:55px;
  border:5px solid rgba(255,255,255,.2);
  border-top:5px solid white;
  border-radius:50%;
  animation:girar 1s linear infinite;
}

@keyframes girar{
  to{
    transform:rotate(360deg);
  }
}

.loadingTexto{
  margin-top:20px;
  font-size:15px;
}

.infoTitulo{
  font-size:13px;
  color:#64748B;
  margin-bottom:4px;
  font-weight:600;
}

.infoValor{
  font-size:15px;
  font-weight:600;
  margin-bottom:14px;
  color:#031D44;
}

.statusOffline{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:#031D44;
  color:white;
  padding:14px;
  border-radius:16px;
  text-align:center;
  z-index:99999;
  box-shadow:0 4px 18px rgba(0,0,0,.25);
}

.contadorResultados{
  font-size:14px;
  color:#64748B;
  margin-bottom:16px;
  font-weight:600;
}

</style>

</head>
<body>

<div id="loadingTela" class="loadingTela oculto">
<div class="loader"></div>
<div class="loadingTexto">Carregando...</div>
</div>

<div id="offlineAviso" class="statusOffline oculto">
📡 Modo Offline Ativo
</div>

<div id="loginTela">

<div class="topo">
<div class="logo">RotaLeitura</div>
<div class="sub">Inteligência em campo</div>
</div>

<div class="container">
<div class="card">

<input type="email" id="email" placeholder="Email">

<input type="password" id="senha" placeholder="Senha">

<button class="botao" onclick="fazerLogin()">
ENTRAR
</button>

</div>
</div>

</div>

<div id="appTela" class="oculto">

<div class="topo">
<div class="logo">RotaLeitura</div>
<div class="sub">Inteligência em campo</div>
</div>

<div class="abas">

<button class="aba ativa" id="btnBusca" onclick="abrirAba('busca')">
BUSCA
</button>

<button class="aba" id="btnMapa" onclick="abrirAba('mapa')">
MAPA
</button>

</div>

<div id="abaBusca" class="container">

<select id="area"></select>

<input list="listaMRUs" id="mru" placeholder="Digite ou selecione a MRU">
<datalist id="listaMRUs"></datalist>

<input type="text" id="busca" placeholder="Buscar instalação, medidor ou cliente">

<div id="resultados"></div>

</div>

<div id="abaMapa" class="container oculto">

<select id="areaMapa"></select>

<input list="listaMRUsMapa" id="mruMapa" placeholder="Digite ou selecione a MRU">
<datalist id="listaMRUsMapa"></datalist>

<button class="botao" onclick="carregarMapa()">
EXIBIR MAPA
</button>

<div id="map"></div>

</div>

<div class="container">
<button class="botao logout" onclick="logout()">
SAIR
</button>
</div>

</div>

<script type="module">

import { initializeApp }
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

import {
getFirestore,
doc,
getDoc
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {

  apiKey: "AIzaSyAVmx3h0aMvivJ3jAVSkyndK8buCnrRbEA",
  authDomain: "rotaleitura.firebaseapp.com",
  projectId: "rotaleitura",
  storageBucket: "rotaleitura.firebasestorage.app",
  messagingSenderId: "1084691059100",
  appId: "1:1084691059100:web:2ce8c10354da0cc191f859"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginTela = document.getElementById('loginTela');
const appTela = document.getElementById('appTela');

const areaSelect = document.getElementById('area');
const areaMapaSelect = document.getElementById('areaMapa');

const listaMRUs = document.getElementById('listaMRUs');
const listaMRUsMapa = document.getElementById('listaMRUsMapa');

const abaBusca = document.getElementById('abaBusca');
const abaMapa = document.getElementById('abaMapa');

const btnBusca = document.getElementById('btnBusca');
const btnMapa = document.getElementById('btnMapa');

const loadingTela = document.getElementById('loadingTela');
const offlineAviso = document.getElementById('offlineAviso');

const resultadosDiv = document.getElementById('resultados');

const inputMRU = document.getElementById('mru');
const inputBusca = document.getElementById('busca');
const inputMRUMapa = document.getElementById('mruMapa');

let permissoes = [];

let bancoBusca = [];
let bancoMapa = [];

let indexes = {};

let cacheVersao = 'v1';

let map = null;

const AREAS = {
"171":"ITABUNA",
"172":"IBICARAI",
"173":"ILHÉUS",
"174":"COARACI",
"175":"CANAVIEIRAS",
"176":"CAMACAN"
};

function mostrarLoading(texto='Carregando...'){

loadingTela.classList.remove('oculto');
document.querySelector('.loadingTexto').innerText = texto;

}

function ocultarLoading(){

loadingTela.classList.add('oculto');

}

/* =========================
   TIMEOUT DE SEGURANÇA
========================= */

setTimeout(()=>{

ocultarLoading();

},10000);

/* =========================
   LOGIN
========================= */

window.fazerLogin = async function(){

try{

mostrarLoading('Entrando...');

await signInWithEmailAndPassword(
auth,
document.getElementById('email').value,
document.getElementById('senha').value
);

}catch(e){

console.error(e);

alert(
'Erro no login.\n\n' +
(e.message || e)
);

ocultarLoading();

}

}

/* =========================
   LOGOUT
========================= */

window.logout = async function(){

await signOut(auth);

}

/* =========================
   AUTH
========================= */

onAuthStateChanged(auth, async (user)=>{

try{

if(!user){

loginTela.classList.remove('oculto');
appTela.classList.add('oculto');

ocultarLoading();

return;

}

mostrarLoading('Carregando usuário...');

const ref = doc(db,'usuarios',user.email);

const snap = await getDoc(ref);

if(!snap.exists()){

alert('Usuário sem permissão.');

await logout();

ocultarLoading();

return;

}

const dados = snap.data();

if(!dados.ativo){

alert('Usuário desativado.');

await logout();

ocultarLoading();

return;

}

permissoes = dados.areas || [];

loginTela.classList.add('oculto');
appTela.classList.remove('oculto');

await carregarSistema();

ocultarLoading();

}catch(e){

console.error(e);

alert(
'Erro ao carregar usuário.\n\n' +
(e.message || e)
);

ocultarLoading();

}

});

/* =========================
   SISTEMA
========================= */

async function carregarSistema(){

try{

mostrarLoading('Carregando sistema...');

const response = await fetch('./indexes.json?v=' + Date.now());

if(!response.ok){

throw new Error('indexes.json não encontrado');

}

indexes = await response.json();

popularAreas();

ocultarLoading();

}catch(e){

console.error(e);

alert(
'Erro ao carregar indexes.json\n\n' +
(e.message || e)
);

ocultarLoading();

}

}

/* =========================
   ÁREAS
========================= */

function popularAreas(){

let html = '<option value="">Selecionar Área</option>';

permissoes.forEach(area=>{

html += `
<option value="${area}">
${area} - ${AREAS[area]}
</option>
`;

});

areaSelect.innerHTML = html;
areaMapaSelect.innerHTML = html;

if(permissoes.length === 1){

areaSelect.value = permissoes[0];
areaMapaSelect.value = permissoes[0];

areaSelect.style.display='none';
areaMapaSelect.style.display='none';

carregarArea();
carregarAreaMapa();

}

}

/* =========================
   ABAS
========================= */

window.abrirAba = function(tipo){

abaBusca.classList.add('oculto');
abaMapa.classList.add('oculto');

btnBusca.classList.remove('ativa');
btnMapa.classList.remove('ativa');

if(tipo === 'busca'){

abaBusca.classList.remove('oculto');
btnBusca.classList.add('ativa');

}else{

abaMapa.classList.remove('oculto');
btnMapa.classList.add('ativa');

setTimeout(()=>{

if(map){
map.invalidateSize();
}

},300);

}

}

/* =========================
   NORMALIZAR
========================= */

function normalizar(texto){

return String(texto || '')
.toLowerCase()
.normalize('NFD')
.replace(/[\u0300-\u036f]/g,'')
.replace(/\s+/g,'')
.trim();

}

/* =========================
   BUSCA
========================= */

areaSelect.addEventListener('change', carregarArea);

async function carregarArea(){

try{

mostrarLoading('Carregando instalações...');

bancoBusca = [];

const area = areaSelect.value;

const cacheKey = 'area_'+area+'_'+cacheVersao;

try{

const arquivos = indexes[area] || [];

for(const arquivo of arquivos){

const response = await fetch('./'+arquivo+'?v='+Date.now());

if(!response.ok){
throw new Error('Erro ao baixar JSON');
}

const parte = await response.json();

bancoBusca = bancoBusca.concat(parte);

}

/* =========================
   SALVAR CACHE
========================= */

localStorage.setItem(
cacheKey,
JSON.stringify(bancoBusca)
);

}catch(erroInternet){

console.log('Sem internet, usando cache...');

/* =========================
   FALLBACK OFFLINE
========================= */

const cacheSalvo = localStorage.getItem(cacheKey);

if(cacheSalvo){

bancoBusca = JSON.parse(cacheSalvo);

}else{

throw new Error('Sem internet e sem cache salvo');

}

}

/* =========================
   MRUS
========================= */

const mrus = [...new Set(bancoBusca.map(i=>i[0]))];

mrus.sort();

listaMRUs.innerHTML='';

mrus.forEach(mru=>{

listaMRUs.innerHTML += `
<option value="${mru}">
`;

});

ocultarLoading();

}catch(e){

console.error(e);

alert(
'Erro ao carregar área.\n\n' +
(e.message || e)
);

ocultarLoading();

}

}

inputMRU.addEventListener('input', pesquisar);
inputBusca.addEventListener('input', pesquisar);

function pesquisar(){

const filtroMRU = normalizar(inputMRU.value);
const filtroTexto = normalizar(inputBusca.value);

const resultados = bancoBusca.filter(item=>{

const okMRU =
!filtroMRU ||
normalizar(item[0]).includes(filtroMRU);

const texto = normalizar(
(item[1]||'')+' '+
(item[2]||'')+' '+
(item[3]||'')+' '+
(item[4]||'')+' '+
(item[5]||'')+' '+
(item[6]||'')+' '+
(item[7]||'')
);

const okTexto =
!filtroTexto ||
texto.includes(filtroTexto);

return okMRU && okTexto;

}).slice(0,100);

let html = `
<div class="contadorResultados">
${resultados.length} resultado(s)
</div>
`;

if(resultados.length===0){

html += `
<div class="card">
Nenhum resultado encontrado.
</div>
`;

}

resultados.forEach(item=>{

html += `
<div class="card">

<div class="infoTitulo">⚡ Instalação</div>
<div class="infoValor">${item[1] || ''}</div>

<div class="infoTitulo">🔢 Medidor</div>
<div class="infoValor">${item[2] || ''}</div>

<div class="infoTitulo">📍 Endereço</div>
<div class="infoValor">
${item[3] || ''}, ${item[4] || ''}
</div>

<div class="infoTitulo">🗺 Bairro</div>
<div class="infoValor">${item[5] || ''}</div>

<div class="infoTitulo">🏙 Cidade</div>
<div class="infoValor">${item[6] || ''}</div>

<div class="infoTitulo">👤 Cliente</div>
<div class="infoValor">${item[7] || ''}</div>

<a class="botao"
href="${item[10] || '#'}"
target="_blank">

🗺 Navegar

</a>

</div>
`;

});

resultadosDiv.innerHTML = html;

}

/* =========================
   MAPA
========================= */

areaMapaSelect.addEventListener('change', carregarAreaMapa);

async function carregarAreaMapa(){

try{

bancoMapa=[];

const arquivos = indexes[areaMapaSelect.value] || [];

for(const arquivo of arquivos){

const response = await fetch('./'+arquivo+'?v='+Date.now());

const parte = await response.json();

bancoMapa = bancoMapa.concat(parte);

}

const mrus = [...new Set(bancoMapa.map(i=>i[0]))];

mrus.sort();

listaMRUsMapa.innerHTML='';

mrus.forEach(mru=>{

listaMRUsMapa.innerHTML += `
<option value="${mru}">
`;

});

}catch(e){

console.error(e);

alert(
'Erro ao carregar mapa.\n\n' +
(e.message || e)
);

}

}

window.carregarMapa = function(){

let dados = bancoMapa.filter(i=>i[0] == inputMRUMapa.value);

if(dados.length===0){
alert('Nenhuma instalação encontrada');
return;
}

let primeiro = dados.find(i=>i[8] !== 'nan' && i[9] !== 'nan');

if(!primeiro){
alert('Sem coordenadas válidas');
return;
}

if(map){
map.remove();
}

map = L.map('map').setView([
parseFloat(primeiro[8]),
parseFloat(primeiro[9])
],15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

dados.forEach(item=>{

if(
item[8] == 'nan' ||
item[9] == 'nan' ||
!item[8] ||
!item[9]
) return;

let lat = parseFloat(item[8]);
let lng = parseFloat(item[9]);

if(isNaN(lat) || isNaN(lng)) return;

let marker = L.marker([lat,lng]).addTo(map);

marker.bindPopup(`

<div style="font-family:Inter,sans-serif;min-width:220px;">

<div style="font-weight:700;font-size:15px;margin-bottom:10px;color:#031D44;">
⚡ ${item[1]}
</div>

<div style="margin-bottom:8px;">
<b>👤 Cliente:</b><br>
${item[7] || '-'}
</div>

<div style="margin-bottom:8px;">
<b>🔢 Medidor:</b><br>
${item[2] || '-'}
</div>

<div style="margin-bottom:12px;">
<b>📍 Endereço:</b><br>
${item[3] || '-'}, ${item[4] || ''}
</div>

<a 
href="${item[10]}" 
target="_blank"
style="
display:block;
background:#1976D2;
color:white;
text-align:center;
padding:12px;
border-radius:12px;
text-decoration:none;
font-weight:600;
">
🗺 Navegar
</a>

</div>

`);

});

setTimeout(()=>{
map.invalidateSize();
},300);

}
/* =========================
   INTERNET
========================= */

function atualizarInternet(){

if(navigator.onLine){

offlineAviso.classList.add('oculto');

}else{

offlineAviso.classList.remove('oculto');

}

}

window.addEventListener('online', atualizarInternet);
window.addEventListener('offline', atualizarInternet);

atualizarInternet();

/* =========================
   SERVICE WORKER
========================= */

if ('serviceWorker' in navigator) {

navigator.serviceWorker.getRegistrations()
.then(registrations=>{

for(let registration of registrations){

registration.unregister();

}

});

}

ocultarLoading();

</script>

</body>
</html>
