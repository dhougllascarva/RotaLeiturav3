<script type="module">

import { initializeApp }
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut,
setPersistence,
browserLocalPersistence
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
initializeFirestore,
persistentLocalCache,
persistentMultipleTabManager,
doc,
getDoc
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {

  apiKey: "AIzaSyAVmx3h0aMvivJ3jAVSkyndK8buCnrRbEA",
  authDomain: "rotaleitura.firebaseapp.com",
  projectId: "rotaleitura",
  storageBucket: "rotaleitura.firebasestorage.app",
  messagingSenderId: "1084691059100",
  appId: "1:1084691059100:web:2ce8c10354da0cc191f859"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

await setPersistence(
auth,
browserLocalPersistence
);

const db = initializeFirestore(app,{
localCache: persistentLocalCache({
tabManager: persistentMultipleTabManager()
})
});

const loginTela = document.getElementById('loginTela');
const appTela = document.getElementById('appTela');

const areaSelect = document.getElementById('area');
const areaMapaSelect = document.getElementById('areaMapa');

const listaMRUs = document.getElementById('listaMRUs');
const listaMRUsMapa = document.getElementById('listaMRUsMapa');

const abaBusca = document.getElementById('abaBusca');
const abaMapa = document.getElementById('abaMapa');

const btnBusca = document.getElementById('btnBusca');
const btnMapa = document.getElementById('btnMapa');

const loadingTela = document.getElementById('loadingTela');
const offlineAviso = document.getElementById('offlineAviso');

const resultadosDiv = document.getElementById('resultados');

const statusOfflineCard =
document.getElementById('statusOfflineCard');

const inputMRU = document.getElementById('mru');
const inputBusca = document.getElementById('busca');
const inputMRUMapa = document.getElementById('mruMapa');

let permissoes = [];
let bancoBusca = [];
let bancoBuscaIndexado = [];
let bancoMapa = [];
let indexes = {};
let map = null;
let watchId = null;
const CACHE_VERSION = '1.0.2';
const DEBUG = false;

/* =========================
   INDEXED DB
========================= */

let dbOffline = null;
  
await abrirBancoOffline();

function abrirBancoOffline(){

return new Promise((resolve,reject)=>{

const request = indexedDB.open('RotaLeituraDB',1);

request.onupgradeneeded = function(event){

const db = event.target.result;

if(!db.objectStoreNames.contains('areas')){

db.createObjectStore('areas');

}

};

request.onsuccess = function(event){

dbOffline = event.target.result;

if(DEBUG){
console.log('Banco offline iniciado');
}

resolve();

};

request.onerror = function(){

reject('Erro ao abrir IndexedDB');

};

});

}

/* =========================
   SALVAR ÁREA OFFLINE
========================= */

async function salvarAreaOffline(nomeArea,dados){

return new Promise((resolve,reject)=>{

const transaction =
dbOffline.transaction(['areas'],'readwrite');

const store = transaction.objectStore('areas');

const request = store.put({
 dados:dados,
  data:Date.now(),
  versao:CACHE_VERSION
},nomeArea);

request.onsuccess = ()=>resolve();

request.onerror = ()=>reject();

});

}

/* =========================
   LER ÁREA OFFLINE
========================= */

async function lerAreaOffline(nomeArea){

return new Promise((resolve,reject)=>{

const transaction =
dbOffline.transaction(['areas'],'readonly');

const store = transaction.objectStore('areas');

const request = store.get(nomeArea);

request.onsuccess = ()=>{

resolve(request.result);

};

request.onerror = ()=>reject();

});

}

const AREAS = {
"171":"ITABUNA",
"172":"IBICARAI",
"173":"ILHÉUS",
"174":"COARACI",
"175":"CANAVIEIRAS",
"176":"CAMACAN"
};

function mostrarLoading(texto='Carregando...'){

loadingTela.classList.remove('oculto');

document.querySelector('.loadingTexto')
.innerText = texto;

/* RESET DA BARRA */


}

function ocultarLoading(){

loadingTela.classList.add('oculto');

}

/* =========================
   TIMEOUT DE SEGURANÇA
========================= */

setTimeout(()=>{

ocultarLoading();

},10000);

/* =========================
   LOGIN
========================= */

window.fazerLogin = async function(){

try{

mostrarLoading('Entrando...');

await signInWithEmailAndPassword(
auth,
document.getElementById('email').value,
document.getElementById('senha').value
);

}catch(e){

console.error(e);

alert(
'Erro no login.\n\n' +
(e.message || e)
);

ocultarLoading();

}

}

/* =========================
   LOGOUT
========================= */

window.logout = async function(){

await signOut(auth);

}

/* =========================
   VERIFICAR ACESSO
========================= */

async function verificarPermissaoAtual(){

try{

const user = auth.currentUser;

if(!user) return;

const ref = doc(db,'usuarios',user.email);

const snap = await getDoc(ref);

if(!snap.exists()){

alert('Usuário removido.');

await logout();

return;

}

const dados = snap.data();

if(!dados.ativo){

alert('Seu acesso foi desativado.');

await logout();

return;

}

}catch(e){

console.error(
'Erro ao verificar acesso:',
e
);

}

}

/* =========================
   AUTH
========================= */

onAuthStateChanged(auth, async (user)=>{

try{

if(!user){

loginTela.classList.remove('oculto');
appTela.classList.add('oculto');

ocultarLoading();

return;

}

mostrarLoading('Carregando usuário...');

const ref = doc(db,'usuarios',user.email);

const snap = await getDoc(ref);

if(!snap.exists()){

alert('Usuário sem permissão.');

await logout();

ocultarLoading();

return;

}

const dados = snap.data();

if(!dados.ativo){

alert('Usuário desativado.');

await logout();

ocultarLoading();

return;

}

permissoes = dados.areas || [];

loginTela.classList.add('oculto');
appTela.classList.remove('oculto');

await carregarSistema();

await sincronizarOffline();

ocultarLoading();

}catch(e){

console.error(e);

alert(
'Erro ao carregar usuário.\n\n' +
(e.message || e)
);

ocultarLoading();

}

});

/* =========================
   SISTEMA
========================= */

async function carregarSistema(){

try{

mostrarLoading('Carregando sistema...');

const response = await fetch('./indexes.json?v=' + CACHE_VERSION);

if(!response.ok){

throw new Error('indexes.json não encontrado');

}

try{

indexes = await response.json();

}catch{

throw new Error(
'indexes.json corrompido'
);

}

popularAreas();

ocultarLoading();

}catch(e){

console.error(e);

alert(
'Erro ao carregar indexes.json\n\n' +
(e.message || e)
);

ocultarLoading();

}

}

async function sincronizarOffline(){

try{

mostrarLoading(
'Sincronizando dados offline...'
);

for(const area of permissoes){

const cacheExistente =
await lerAreaOffline(area);

if(
   cacheExistente &&
   cacheExistente.versao === CACHE_VERSION
){

if(DEBUG){
console.log(
'Área já sincronizada:',
area
);
}

   continue;

}

let dadosOffline = [];

const arquivos = indexes[area] || [];

for(const arquivo of arquivos){

const response =
await fetch('./'+arquivo+'?v=' + CACHE_VERSION);

if(!response.ok){

throw new Error(
'Erro ao baixar ' + arquivo
);

}

const parte = await response.json();

dadosOffline.push(...parte);

}

await salvarAreaOffline(
area,
dadosOffline
);

if(DEBUG){
console.log(
'Área sincronizada:',
area
);
}

}

document.querySelector('.loadingTexto')
.innerText =
'✅ Offline pronto';

setTimeout(()=>{

ocultarLoading();

},800);

}catch(e){

console.error(e);

alert(
'Erro ao sincronizar offline'
);

ocultarLoading();

}

}

async function atualizarStatusOffline(area){

const cache = await lerAreaOffline(area);

statusOfflineCard.classList.remove('oculto');

if(cache){

statusOfflineCard.innerHTML = `

<div class="statusOk">
🟢 Busca Offline Disponível
</div>

<div style="margin-top:8px;">
Os dados da área estão salvos neste aparelho.
</div>

<div style="margin-top:14px;" class="statusAlerta">
🟡 Mapas parcialmente offline
</div>

<div style="margin-top:8px;">
Abra a região online ao menos 1x para melhor funcionamento do mapa offline.
</div>

`;

}else{

statusOfflineCard.innerHTML = `

<div class="statusErro">
🔴 Área ainda não sincronizada
</div>

<div style="margin-top:8px;">
Conecte-se à internet para carregar os dados desta área.
</div>

`;

}

}

/* =========================
   ÁREAS
========================= */

function popularAreas(){

let html = '<option value="">Selecionar Área</option>';

permissoes.forEach(area=>{

html += `
<option value="${area}">
${area} - ${AREAS[area]}
</option>
`;

    areaMapaSelect.value = permissoes[0];

    areaSelect.style.display='none';
    areaMapaSelect.style.display='none';

    carregarArea();
    carregarAreaMapa();

}

}

/* =========================
   ABAS
========================= */

window.abrirAba = function(tipo){

abaBusca.classList.add('oculto');
abaMapa.classList.add('oculto');

btnBusca.classList.remove('ativa');
btnMapa.classList.remove('ativa');

if(tipo === 'busca'){

   /* LIMPA MAPA */


   if(map){

     if(watchId){

navigator.geolocation.clearWatch(watchId);
watchId = null;

}
      map.remove();
      map = null;
     
     document.getElementById('map').innerHTML = '';

   }

abaBusca.classList.remove('oculto');
btnBusca.classList.add('ativa');

}else{

   /* LIMPA BUSCA */


   resultadosDiv.innerHTML = '';

abaMapa.classList.remove('oculto');
btnMapa.classList.add('ativa');

setTimeout(()=>{

if(map){
map.invalidateSize();
}

},300);

}

}

/* =========================
   NORMALIZAR
========================= */

function normalizar(texto){

return String(texto || '')
.toLowerCase()
.normalize('NFD')
.replace(/[\u0300-\u036f]/g,'')
.replace(/\s+/g,'')
.trim();

}

/* =========================
   INDEXAÇÃO DE BUSCA
========================= */

function indexarBusca(){

bancoBuscaIndexado = bancoBusca.map(item=>{

const textoCompleto = normalizar(
(item[0]||'')+' '+
(item[1]||'')+' '+
(item[2]||'')+' '+
(item[3]||'')+' '+
(item[4]||'')+' '+
(item[5]||'')+' '+
(item[6]||'')+' '+
(item[7]||'')
);

return {
dados:item,
texto:textoCompleto,
mru:normalizar(item[0]||'')
};

});

}

/* =========================
   BUSCA
========================= */


areaSelect.addEventListener('change', carregarArea);

async function carregarArea(){

try{

mostrarLoading('Carregando instalações...');

bancoBusca = [];

const area = areaSelect.value;

if(!area){

ocultarLoading();
return;

}

const cacheSalvo =
await lerAreaOffline(area);

if(!cacheSalvo){

throw new Error(
'Área não sincronizada offline'
);

}

bancoBusca = cacheSalvo.dados;

await atualizarStatusOffline(area);

/* =========================
   INDEXAÇÃO
========================= */

indexarBusca();

/* =========================
   MRUS
========================= */

const mrus =
[...new Set(bancoBusca.map(i=>i[0]))];

mrus.sort();

listaMRUs.innerHTML='';

mrus.forEach(mru=>{

listaMRUs.innerHTML += `
<option value="${mru}">
`;

});

ocultarLoading();

}catch(e){

console.error(e);

alert(
'Erro ao carregar área.\n\n' +
(e.message || e)
);

ocultarLoading();

}

}

let timerBusca = null;

inputMRU.addEventListener('input', ()=>{

clearTimeout(timerBusca);

timerBusca = setTimeout(()=>{
pesquisar();
},80);

});

inputBusca.addEventListener('input', ()=>{

clearTimeout(timerBusca);

timerBusca = setTimeout(()=>{
pesquisar();
},80);

});

function pesquisar(){

if(
inputBusca.value.trim().length < 5 &&
inputMRU.value.trim().length < 5
){

resultadosDiv.innerHTML = '';
return;

}

if(
inputBusca.value.trim() === '' &&
inputMRU.value.trim() === ''
){

resultadosDiv.innerHTML = '';
return;

}

const filtroMRU =
normalizar(inputMRU.value);

const filtroTexto =
normalizar(inputBusca.value);

const resultados = []; 

for(let i = 0; i < bancoBuscaIndexado.length; i++){ 

const item = bancoBuscaIndexado[i];

const okMRU =
!filtroMRU ||
item.mru.includes(filtroMRU);

const okTexto =
!filtroTexto ||
item.texto.includes(filtroTexto);

if(okMRU && okTexto){

resultados.push(item.dados);

}

}


let html = `
<div class="contadorResultados">
${resultados.length} resultado(s)
</div>
`;

if(resultados.length===0){

html += `
<div class="card">
Nenhum resultado encontrado.
</div>
`;

}

resultados.forEach(item=>{

html += `
<div class="card">

<div class="infoTitulo">⚡ Instalação</div>
<div class="infoValor">${item[1] || ''}</div>

<div class="infoTitulo">🔢 Medidor</div>
<div class="infoValor">${item[2] || ''}</div>

<div class="infoTitulo">📍 Endereço</div>
<div class="infoValor">
${item[3] || ''}, ${item[4] || ''}
</div>

<div class="infoTitulo">🗺 Bairro</div>
<div class="infoValor">${item[5] || ''}</div>

<div class="infoTitulo">🏙 Cidade</div>
<div class="infoValor">${item[6] || ''}</div>

<div class="infoTitulo">👤 Cliente</div>
<div class="infoValor">${item[7] || ''}</div>

<a class="botao"
href="${item[10] || '#'}"
target="_blank">

🗺 Navegar

</a>

</div>
`;

});

resultadosDiv.innerHTML = html;

}

/* =========================
   MAPA
========================= */

areaMapaSelect.addEventListener('change', carregarAreaMapa);

async function carregarAreaMapa(){

try{

mostrarLoading('Carregando mapa...');

bancoMapa = [];

const area = areaMapaSelect.value;

if(!area){

ocultarLoading();
return;

}

const cache =
await lerAreaOffline(area);

if(!cache){

throw new Error(
'Área offline não encontrada'
);

}

bancoMapa = cache.dados;

/* =========================
   MRUS
========================= */

const mrus =
[...new Set(bancoMapa.map(i=>i[0]))];

mrus.sort();

listaMRUsMapa.innerHTML='';

mrus.forEach(mru=>{

listaMRUsMapa.innerHTML += `
<option value="${mru}">
`;

});

ocultarLoading();

}catch(e){

console.error(e);

alert(
'Erro ao carregar mapa.\n\n' +
(e.message || e)
);

ocultarLoading();

}

}

window.carregarMapa = function(){

let dados = bancoMapa.filter(i=>i[0] == inputMRUMapa.value);

if(dados.length===0){
alert('Nenhuma instalação encontrada');
return;
}

let primeiro = dados.find(i=>i[8] !== 'nan' && i[9] !== 'nan');

if(!primeiro){
alert('Sem coordenadas válidas');
return;
}

if(map){
map.remove();
}

map = L.map('map',{
preferCanvas:true,
zoomAnimation:false,
fadeAnimation:false,
markerZoomAnimation:false
}).setView([
parseFloat(primeiro[8]),
parseFloat(primeiro[9])
],15);

const mapaPadrao = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
);

const mapaSatelite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
attribution:'© Esri'
}
);

mapaPadrao.addTo(map);

/* =========================
   LOCALIZAÇÃO DO LEITURISTA
========================= */

let marcadorUsuario = null;

if(navigator.geolocation){

if(watchId){

navigator.geolocation.clearWatch(watchId);
watchId = null;

}

watchId = navigator.geolocation.watchPosition(
(posicao)=>{

const latUser = posicao.coords.latitude;
const lngUser = posicao.coords.longitude;

if(marcadorUsuario){

marcadorUsuario.setLatLng([latUser,lngUser]);

}else{

marcadorUsuario = L.circleMarker(
[latUser,lngUser],
{

radius:10,

color:'#FFFFFF',
weight:3,

fillColor:'#00E676',
fillOpacity:1

}
).addTo(map);

marcadorUsuario.bringToFront();

if(!map._usuarioCentralizado){

map.setView([latUser,lngUser],17);

map._usuarioCentralizado = true;

}

marcadorUsuario.bindPopup(`
<div style="
font-family:Inter,sans-serif;
font-weight:600;
">
📍 Sua localização
</div>
`);

}

},

(erro)=>{

if(DEBUG){
console.log('Erro GPS:', erro);
}

},

{

enableHighAccuracy:true,
maximumAge:5000,
timeout:10000

}

);

}

L.control.layers({
'🗺 Mapa': mapaPadrao,
'🛰 Satélite': mapaSatelite
}).addTo(map);

const bounds = [];

const clusterGroup = L.markerClusterGroup({

maxClusterRadius:20,

spiderfyOnMaxZoom:true,
showCoverageOnHover:false,
zoomToBoundsOnClick:true,

iconCreateFunction:function(cluster){

const count = cluster.getChildCount();

return L.divIcon({

html:`
<div style="
background:#1976D2;
color:white;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:14px;
border:3px solid white;
box-shadow:0 0 10px rgba(0,0,0,.35);
">
${count}
</div>
`,

className:'',
iconSize:[42,42]

});

}

});

for(let i = 0; i < dados.length; i++){

const item = dados[i];

if(
item[8] == 'nan' ||
item[9] == 'nan' ||
!item[8] ||
!item[9]
) continue;

const lat = parseFloat(item[8]);
const lng = parseFloat(item[9]);


bounds.push([lat,lng]);

const marker = L.circleMarker([lat,lng],{

radius:8,

color:'#FFFFFF',
weight:3,

fillColor:'#00B0FF',
fillOpacity:1

});

marker.instalacao = item[1] || '-';
marker.options.link = item[10];
  
marker.on('mouseover', function(){
this.setStyle({
fillColor:'#FF6D00'
});
});

marker.on('mouseout', function(){
this.setStyle({
fillColor:'#00B0FF'
});
});

marker.bindPopup(`

<div style="
font-family:Inter,sans-serif;
min-width:220px;
">

<div style="
font-weight:700;
font-size:15px;
margin-bottom:10px;
color:#031D44;
">
⚡ ${item[1]}
</div>

<div style="margin-bottom:8px;">
<b>👤 Cliente:</b><br>
${item[7] || '-'}
</div>

<div style="margin-bottom:8px;">
<b>🔢 Medidor:</b><br>
${item[2] || '-'}
</div>

<div style="margin-bottom:12px;">
<b>📍 Endereço:</b><br>
${item[3] || '-'}, ${item[4] || ''}
</div>

<a 
href="${item[10]}" 
target="_blank"
style="
display:block;
background:#1976D2;
color:white;
text-align:center;
padding:12px;
border-radius:12px;
text-decoration:none;
font-weight:600;
">
🗺 Navegar
</a>

</div>

`);

clusterGroup.addLayer(marker);
marker.bringToFront();

}

map.addLayer(clusterGroup);

clusterGroup.on('clusterclick', function(a){

const markers =
a.layer.getAllChildMarkers();

let html = `
<div style="
max-height:320px;
overflow:auto;
min-width:260px;
font-family:Inter,sans-serif;
">
`;

markers.forEach((m,index)=>{

html += `
<div style="
padding:10px 0;
">

<div style="
font-weight:700;
font-size:14px;
margin-bottom:6px;
">
⚡ Instalação
</div>

<div style="
margin-bottom:10px;
font-weight:600;
color:#031D44;
">
${m.instalacao || '-'}
</div>

<button
onclick="window.open('${m.options.link}','_blank')"
style="
background:#1976D2;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:600;
cursor:pointer;
width:100%;
"
>
🗺 Navegar
</button>

</div>
`;

if(index < markers.length - 1){

html += `
<hr style="
border:none;
border-top:1px solid #E2E8F0;
margin:14px 0;
">
`;

}

});

html += `</div>`;

L.popup({
maxWidth:320
})
.setLatLng(a.layer.getLatLng())
.setContent(html)
.openOn(map);

});


if(bounds.length > 0){

map.fitBounds(bounds,{
padding:[30,30]
});

}

/* =========================
   CENTRALIZAR NO USUÁRIO
========================= */

if(marcadorUsuario){

setTimeout(()=>{

map.setView(
marcadorUsuario.getLatLng(),
17
);

},1000);

}


setTimeout(()=>{
map.invalidateSize();
},300);

}
/* =========================
   INTERNET
========================= */

function atualizarInternet(){

if(navigator.onLine){

offlineAviso.classList.add('oculto');

}else{

offlineAviso.classList.remove('oculto');

}

}

window.addEventListener(
'online',
()=>{

atualizarInternet();

verificarPermissaoAtual();

}
);
window.addEventListener('offline', atualizarInternet);

atualizarInternet();

/* =========================
   SERVICE WORKER
========================= */

if ('serviceWorker' in navigator) {

window.addEventListener('load', async ()=>{

try{

const registro =
await navigator.serviceWorker.register('./sw.js');

if(DEBUG){
console.log('SW registrado');
}

registro.update();

/* =========================
NOVA VERSÃO
========================= */

registro.addEventListener('updatefound', ()=>{

const novoWorker = registro.installing;

novoWorker.addEventListener('statechange', ()=>{

if(
novoWorker.state === 'installed' &&
navigator.serviceWorker.controller
){

if(DEBUG){
console.log('Nova versão disponível');
}


}

});

});

}catch(e){

console.error('Erro SW:', e);

}

});

}

ocultarLoading();

/* =========================
   VERIFICA AO VOLTAR APP
========================= */

document.addEventListener(
'visibilitychange',
()=>{

if(
document.visibilityState === 'visible' &&
navigator.onLine
){

verificarPermissaoAtual();

}

}
);
  
</script>

</body>
</html>
